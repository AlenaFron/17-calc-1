<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; background-color: #f4f4f4; }
        .calc { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 300px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; text-align: center; }
        input { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        .btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        button { padding: 10px; cursor: pointer; font-size: 18px; border: none; background: #007bff; color: white; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .res-box { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 5px; text-align: center; font-size: 18px; }
        #result { font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="calc">
        <h3>Калькулятор</h3>
        <!-- Поля ввода -->
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">

        <div class="btns">
            <!-- Передаем операцию прямо в функцию -->
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">*</button>
            <button onclick="calculate('/')">/</button>
        </div>

        <!-- Поле вывода -->
        <div class="res-box">Результат: <span id="result">0</span></div>
    </div>

    <script>
        function calculate(operation) {
            // 1. Находим элементы
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const resultElement = document.getElementById('result');

            // 2. Проверка на пустые поля
            if (isNaN(n1) || isNaN(n2)) {
                resultElement.textContent = 'Введите числа!';
                resultElement.style.color = 'red';
                return;
            }

            // 3. Считаем
            let res;
            if (operation === '+') res = n1 + n2;
            if (operation === '-') res = n1 - n2;
            if (operation === '*') res = n1 * n2;
            if (operation === '/') {
                res = (n2 === 0) ? 'На 0 нельзя!' : n1 / n2;
            }

            // 4. Выводим (округлим до 2 знаков, если это дробь)
            resultElement.style.color = '#333';
            resultElement.textContent = Number.isInteger(res) ? res : res.toFixed(2);
        }
    </script>
</body>
</html>
